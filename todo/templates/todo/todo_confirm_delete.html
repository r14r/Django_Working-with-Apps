{% extends 'base.html' %}

{% block title %}To-do löschen{% endblock %}

{% block content %}
<div class="card">
    <h1>To-do löschen</h1>
    <p>Soll <strong>{{ item.title }}</strong> wirklich gelöscht werden?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="danger">Ja, löschen</button>
    </form>
</div>
{% endblock %}
