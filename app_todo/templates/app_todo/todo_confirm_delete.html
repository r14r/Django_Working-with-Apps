{% extends 'base.html' %}

{% block title %}To-do löschen{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 3rem auto;">
    <div class="p-card">
        <h2 style="margin-top:0; color: #dc3545;"><i class="pi pi-trash"></i> To-do löschen</h2>
        <p>Soll <strong>{{ item.title }}</strong> wirklich gelöscht werden?</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn btn-danger"><i class="pi pi-trash"></i> Ja, löschen</button>
                <a href="{% url 'app_todo:list' %}" class="btn btn-secondary"><i class="pi pi-times"></i> Abbrechen</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
