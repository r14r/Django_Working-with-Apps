{% extends 'base.html' %}

{% block title %}Passwort zurücksetzen{% endblock %}

{% block content %}
<div class="card">
    <h1>Passwort zurücksetzen</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Reset-Link senden</button>
    </form>
    <p class="muted">Für lokale Tests siehst du die E-Mail im Terminal, wenn du das E-Mail-Backend entsprechend konfigurierst.</p>
</div>
{% endblock %}
