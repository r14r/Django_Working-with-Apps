{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="card">
    <h1>Login</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Einloggen</button>
    </form>
    <p><a href="{% url 'auth_app:password_reset' %}">Passwort vergessen?</a></p>
</div>
{% endblock %}
