{% extends 'base.html' %}

{% block title %}Bestätigungsmail erneut senden{% endblock %}

{% block content %}
<div class="card">
    <h1>Bestätigungsmail erneut senden</h1>
    <form method="post">
        {% csrf_token %}
        <p>
            <label for="email">Deine E-Mail-Adresse:</label><br>
            <input type="email" id="email" name="email" required>
        </p>
        <button type="submit">Senden</button>
    </form>
</div>
{% endblock %}
