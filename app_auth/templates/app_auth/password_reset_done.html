{% extends 'base.html' %}

{% block title %}E-Mail gesendet{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 3rem auto;">
    <div class="p-card">
        <h2 style="margin-top:0; color: var(--primary-color);"><i class="pi pi-check-circle"></i> Reset-E-Mail gesendet</h2>
        <p>Wenn ein Benutzer mit dieser E-Mail existiert, wurde ein Link zum Zurücksetzen verschickt.</p>
        <div class="form-actions">
            <a href="{% url 'app_auth:login' %}" class="btn btn-secondary"><i class="pi pi-arrow-left"></i> Zurück zum Login</a>
        </div>
    </div>
</div>
{% endblock %}
