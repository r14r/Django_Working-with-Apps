{% extends 'base.html' %}

{% block title %}Passwort geändert{% endblock %}

{% block content %}
<div style="max-width: 440px; margin: 3rem auto;">
    <div class="p-card">
        <h2 style="margin-top:0; color: #28a745;"><i class="pi pi-check-circle"></i> Passwort erfolgreich geändert</h2>
        <p>Dein Passwort wurde erfolgreich zurückgesetzt. Du kannst dich jetzt einloggen.</p>
        <div class="form-actions">
            <a href="{% url 'app_auth:login' %}" class="btn btn-primary"><i class="pi pi-sign-in"></i> Zum Login</a>
        </div>
    </div>
</div>
{% endblock %}
