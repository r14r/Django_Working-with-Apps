{% extends 'base.html' %}

{% block title %}Bestätigungsmail erneut senden{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 3rem auto;">
    <div class="p-card">
        <h2 style="margin-top:0; color: var(--primary-color);"><i class="pi pi-refresh"></i> Bestätigungsmail erneut senden</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-field">
                <label for="email">Deine E-Mail-Adresse:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary"><i class="pi pi-send"></i> Senden</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
